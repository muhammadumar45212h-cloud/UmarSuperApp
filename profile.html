<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{background:#000; color:white; font-family:sans-serif; padding:20px 20px 80px 20px; text-align:center;}
    img{width:100px; height:100px; border-radius:50%; border:2px solid red; object-fit:cover;}
    input, textarea{width:90%; padding:12px; margin:8px 0; background:#111; border:1px solid red; color:white; border-radius:8px;}
    button{padding:12px 20px; background:red; border:none; color:white; border-radius:8px; font-weight:bold; margin:5px;}
    video{width:100%; margin-top:10px; border-radius:10px;}
   .bottom-nav{position:fixed; bottom:0; left:0; right:0; height:60px; background:#111; border-top:1px solid red; display:flex; justify-content:space-around; align-items:center;}
   .nav-btn{background:none; border:none; color:#888; font-size:28px; cursor:pointer;}
   .nav-btn.active{color:red;}
  </style>
</head>
<body>
  <h2>Profile</h2>
  <img id="pp" src="https://via.placeholder.com/100">
  <br>
  <input type="file" id="ppUpload" accept="image/*" onchange="setPP(event)">

  <br><br>
  <textarea id="bio" placeholder="Write your bio here..."></textarea>
  <br>
  <button onclick="saveBio()">Save Bio</button>

  <hr style="border:1px solid #333; margin:20px 0;">
  <h3>Upload Video/Post</h3>
  <input type="file" id="mediaUpload" accept="video/*,image/*">
  <button onclick="uploadMedia()">Upload +</button>
  <div id="feed"></div>

  <script>
    function setPP(e){
      document.getElementById("pp").src = URL.createObjectURL(e.target.files[0]);
    }
    function saveBio(){
      alert("Bio Saved: " + document.getElementById("bio").value);
    }
    function uploadMedia(){
      let file = document.getElementById("mediaUpload").files[0];
      if(!file) return;
      let url = URL.createObjectURL(file);
      if(file.type.includes("video")){
        document.getElementById("feed").innerHTML += "<video controls src='"+url+"'></video>";
      } else {
        document.getElementById("feed").innerHTML += "<img src='"+url+"' style='width:100%; border-radius:10px; margin-top:10px;'>";
      }
    }
  </script>

  <div class="bottom-nav">
    <button class="nav-btn" onclick="location.href='index.html'">🏠</button>
    <button class="nav-btn" onclick="history.back()">⬅️</button>
    <button class="nav-btn active">➕</button>
    <button class="nav-btn active">👤</button>
  </div>
</body>
</html>
