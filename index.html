<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umar Super Global App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f19; color: #e2e8f0; padding: 15px; margin: 0; }
        .container { max-width: 480px; margin: auto; padding-bottom: 50px; }
        h2 { text-align: center; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        .form-box { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, textarea, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 14px; }
        input, textarea, select { background: #0f172a; color: white; border: 1px solid #334155; }
        button { background: linear-gradient(135deg, #00ffcc, #0099ff); color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.02); }
        .post { background: #1e293b; padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid #64748b; relative; position: relative; }
        .premium-post { border-left: 5px solid #ffaa00; background: linear-gradient(135deg, #1e293b, #2b220a); box-shadow: 0 0 15px rgba(255,170,0,0.1); }
        .badge { background: #ffaa00; color: black; padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; float: right; }
        .live-badge { background: #ef4444; color: white; padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; float: right; margin-right: 5px; animation: blink 1.5s infinite; }
        video { width: 100%; border-radius: 8px; margin-top: 10px; background: black; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Umar Super App</h2>
        
        <div class="form-box">
            <input type="text" id="username" placeholder="Apna Naam Likhein">
            <select id="postType" onchange="togglePlaceholder()">
                <option value="text">✍️ Text Post</option>
                <option value="video">🎥 Video Link (MP4)</option>
                <option value="live">🔴 Live Stream Link (HLS/.m3u8)</option>
            </select>
            <textarea id="content" placeholder="Kuch likhein..."></textarea>
            <select id="accountType">
                <option value="free">Free User (Normal Reach)</option>
                <option value="premium">Premium User (Top/VIP Reach ⭐)</option>
            </select>
            <button onclick="submitPost()">Publish to World</button>
        </div>

        <h4>🔥 Global Live Feed (Premium Top Par)</h4>
        <div id="feed"></div>
    </div>

    <script>
        function togglePlaceholder() {
            const type = document.getElementById('postType').value;
            const textarea = document.getElementById('content');
            if(type === 'video') textarea.placeholder = "Yahan video ka .mp4 link dalein...";
            else if(type === 'live') textarea.placeholder = "Yahan live stream ka .m3u8 ya video link dalein...";
            else textarea.placeholder = "What's on your mind?";
        }

        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            posts.forEach(post => {
                const div = document.createElement('div');
                div.className = `post ${post.isPremium ? 'premium-post' : ''}`;
                
                let mediaHTML = '';
                if(post.type === 'video' || post.type === 'live') {
                    mediaHTML = `<video src="${post.content}" controls></video>`;
                } else {
                    mediaHTML = `<p>${post.content}</p>`;
                }

                div.innerHTML = `
                    ${post.isPremium ? '<span class="badge">VIP TOP</span>' : ''}
                    ${post.type === 'live' ? '<span class="live-badge">🔴 LIVE</span>' : ''}
                    <strong>@${post.username}</strong>
                    <div style="margin-top: 8px;">${mediaHTML}</div>
                `;
                feed.appendChild(div);
            });
        }

        async function submitPost() {
            const username = document.getElementById('username').value;
            const content = document.getElementById('content').value;
            const type = document.getElementById('postType').value;
            const isPremium = document.getElementById('accountType').value === 'premium';

            if(!username || !content) return alert("Meharbani karke saari maloomat bharein!");

            await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, content, type, isPremium })
            });

            document.getElementById('content').value = '';
            loadPosts();
        }

        loadPosts();
    </script>
</body>
</html>
