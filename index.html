<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081529;
color:white;
overflow:hidden;
}

.topbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:12px;
background:rgba(0,0,0,.5);
font-size:22px;
z-index:100;
}

.feed{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.video-text{
text-align:center;
font-size:20px;
}

.right-icons{
position:absolute;
right:10px;
bottom:130px;
display:flex;
flex-direction:column;
gap:25px;
align-items:center;
}

.social-btn{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
font-size:26px;
}

.social-btn span{
font-size:12px;
margin-top:4px;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
border:2px solid white;
object-fit:cover;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:black;
display:flex;
justify-content:space-around;
align-items:center;
padding:10px;
}

.bottom-nav button{
background:none;
border:none;
font-size:26px;
color:white;
}

.plus{
width:65px;
height:65px;
border-radius:50%;
background:#2563eb;
font-size:35px;
color:white;
}

</style>
</head>

<body>

<div class="topbar">
<div onclick="search()">🔍</div>
<div onclick="notification()">🔔</div>
<div onclick="live()">📺 Live</div>
</div>

<div class="feed">

<div class="video-text">
🚀 Super App Ready
<br><br>
Future AI + Video + Wallet + Trading
</div>

<div class="right-icons">

<div class="social-btn" onclick="like()">
❤️
<span id="likes">0</span>
</div>

<div class="social-btn" onclick="comment()">
💬
<span>Comment</span>
</div>

<div class="social-btn" onclick="sharePost()">
↗
<span>Share</span>
</div>

<div class="social-btn" onclick="sub()">
➕
<span>Sub</span>
</div>

<div class="social-btn" onclick="profile()">
<img src="https://i.pravatar.cc/100" class="profile">
</div>

</div>

</div>

<div class="bottom-nav">

<button onclick="goHome()">🏠</button>

<button onclick="trending()">🔥</button>

<button class="plus" onclick="upload()">+</button>

<button onclick="messages()">💬</button>

<button onclick="trading()">📈</button>

<button onclick="wallet()">💳</button>

<button onclick="settings()">⚙️</button>

</div>

<script>

let count=0;

function like(){
count++;
document.getElementById("likes").innerText=count;
}

function comment(){
alert("Comments opening");
}

function sharePost(){
alert("Sharing post");
}

function sub(){
alert("Subscribed");
}

function profile(){
alert("Profile opening");
}

function goHome(){
alert("Home opened");
}

function trending(){
alert("Trending page");
}

function upload(){
alert("Upload video/post");
}

function messages(){
alert("Messages opening");
}

function trading(){
alert("Trading opening");
}

function wallet(){
alert("Wallet opening");
}

function settings(){
alert("Settings opening");
}

function search(){
alert("Search opening");
}

function notification(){
alert("Notifications opening");
}

function live(){
alert("Live opening");
}

</script>

</body>
</html>
