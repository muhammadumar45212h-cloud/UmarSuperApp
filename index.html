<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umar Super App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0813;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .crown-icon {
            font-size: 60px;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4));
        }

        .app-title {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #a855f7, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 16px;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-field {
            width: 100%;
            background-color: #13111c;
            border: 1px solid #221f30;
            color: #ffffff;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #a855f7;
        }

        .input-field::placeholder {
            color: #4b5563;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.9;
        }

        .btn-launch {
            background: linear-gradient(90deg, #7c3aed, #f43f5e);
            color: #ffffff;
        }

        .btn-google {
            background-color: #ffffff;
            color: #000000;
        }

        .btn-phone {
            background-color: #10b981;
            color: #ffffff;
        }

        /* SVG Logos / Icons styling */
        .btn-icon {
            width: 20px;
            height: 20px;
        }

        .footer-text {
            color: #4b5563;
            font-size: 13px;
            margin-top: 30px;
        }

        .heart {
            color: #ef4444;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Crown Header -->
        <span class="crown-icon">👑</span>
        <h1 class="app-title">Umar Super App</h1>
        <p class="subtitle">Welcome to the Super App</p>

        <!-- Form Fields -->
        <div class="input-group">
            <input type="email" class="input-field" placeholder="Email">
        </div>
        <div class="input-group">
            <input type="password" class="input-field" placeholder="Password">
        </div>
        <div class="input-group">
            <input type="tel" class="input-field" placeholder="Phone Number">
        </div>

        <!-- Action Buttons -->
        <button class="btn btn-launch">
            <span>🚀</span> Launch App
        </button>
        
        <button class="btn btn-google">
            <!-- SVG Google Icon for clean rendering without external image dependencies -->
            <svg class="btn-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
            </svg>
            Continue with Google
        </button>
        
        <button class="btn btn-phone">
            <span>📱</span> Login with Phone
        </button>

        <!-- Footer -->
        <p class="footer-text">Made with <span class="heart">❤️</span> by super app</p>
    </div>

</body>
</html>
