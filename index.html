<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umar Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex justify-center">

    <!-- Responsive Container -->
    <div class="w-full max-w-lg h-screen flex flex-col border-x border-gray-800">
        <div id="content" class="flex-1 overflow-y-auto pb-20">
            <!-- Content yahan render hoga -->
        </div>

        <!-- Navigation Bar -->
        <nav class="fixed bottom-0 w-full max-w-lg bg-gray-900 flex justify-around p-4 border-t border-gray-800">
            <button onclick="renderPage('home')">🏠</button>
            <button onclick="renderPage('profile')">👤</button>
            <button onclick="toggleModal(true)" class="bg-blue-600 rounded-full w-12 h-12 text-2xl">+</button>
            <button onclick="renderPage('chat')">💬</button>
            <button onclick="renderPage('market')">📈</button>
        </nav>
    </div>

<script>
    // Like Toggle Logic
    function toggleLike(btn) {
        btn.classList.toggle('text-red-500');
    }

    // Modal Logic
    function toggleModal(show) {
        document.getElementById('modal').className = show ? 'fixed inset-0 bg-black/90 flex items-center justify-center' : 'hidden';
    }

    // Page Rendering
    function renderPage(page) {
        const root = document.getElementById('content');
        if (page === 'home') {
            root.innerHTML = `<div class="p-4">Video Feed (Full Screen) 
                <button onclick="toggleLike(this)" class="block mt-4 text-3xl">❤️</button></div>`;
        } else if (page === 'profile') {
            root.innerHTML = `<div class="p-6 text-center">
                <img src="https://via.placeholder.com/100" class="mx-auto rounded-full">
                <h2 class="mt-4 font-bold text-xl" contenteditable="true">Umar Boss</h2>
                <div class="flex justify-center gap-8 mt-4">
                    <div>1.2k<p class="text-xs">SUBS</p></div>
                    <div>50k<p class="text-xs">LIKES</p></div>
                </div>
            </div>`;
        }
    }
    renderPage('home');
</script>
</body>
</html>
