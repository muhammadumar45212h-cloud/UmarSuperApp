<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Umar Super App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    .toast-enter { transform: translateY(-100%); opacity: 0; transition: all 0.3s ease; }
    .toast-show { transform: translateY(0); opacity: 1; transition: all 0.3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [showPostModal, setShowPostModal] = useState(false);
      const [showCodeModal, setShowCodeModal] = useState(false);
      const [showWalletModal, setShowWalletModal] = useState(false);
      const [toast, setToast] = useState(null);

      // User Profile State
      const [profile, setProfile] = useState({
        name: 'Umar Developer',
        bio: 'Super App Founder & Developer',
        avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=Umar'
      });

      // Posts Feed State
      const [posts, setPosts] = useState([
        {
          id: 1,
          author: '@umar_official',
          caption: 'Welcome to Umar Super App Fullscreen Feed! 🔥 #superapp #tech',
          videoUrl: 'https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-leaves-2652-large.mp4',
          likes: 12500,
          comments: 450
        }
      ]);

      // Toast Notification Helper (No Browser Alerts!)
      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      // Video Upload Handler
      const handlePublishPost = (e) => {
        e.preventDefault();
        const caption = e.target.caption.value;
        const file = e.target.videoFile.files[0];

        if (!file) {
          showToast('Please select a video file first!', 'error');
          return;
        }

        const videoUrl = URL.createObjectURL(file);
        const newPost = {
          id: Date.now(),
          author: `@${profile.name.toLowerCase().replace(/\s+/g, '_')}`,
          caption: caption || 'New uploaded content 🚀',
          videoUrl: videoUrl,
          likes: 0,
          comments: 0
        };

        setPosts([newPost, ...posts]);
        setShowPostModal(false);
        showToast('Post live feed par publish ho chuki hai! 🎉');
      };

      // Profile Update Handler
      const handleUpdateProfile = (e) => {
        e.preventDefault();
        const newName = e.target.newName.value;
        const newBio = e.target.newBio.value;
        const avatarFile = e.target.avatarFile.files[0];

        let updatedAvatar = profile.avatar;
        if (avatarFile) {
          updatedAvatar = URL.createObjectURL(avatarFile);
        }

        setProfile({
          name: newName || profile.name,
          bio: newBio || profile.bio,
          avatar: updatedAvatar
        });

        showToast('Profile successfully update ho gayi hai! ✨');
      };

      return (
        <div className="max-w-md mx-auto min-h-screen bg-slate-900 text-white relative pb-20 flex flex-col">
          
          {/* TOP TOAST NOTIFICATION (Replaces Popups) */}
          {toast && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-pink-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm font-medium animate-bounce">
              {toast.message}
            </div>
          )}

          {/* HEADER */}
          <header className="p-4 flex items-center justify-between border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
            <h1 className="text-xl font-bold bg-gradient-to-r from-pink-500 to-rose-500 bg-clip-text text-transparent">
              Umar Super App
            </h1>
            <div className="flex gap-2">
              <button onClick={() => setShowCodeModal(true)} className="p-2 bg-slate-800 rounded-full text-xs flex items-center gap-1 hover:bg-slate-700">
                <i className="fa-solid font-mono">&lt;/&gt;</i> Code
              </button>
              <button onClick={() => setShowWalletModal(true)} className="p-2 bg-slate-800 rounded-full text-xs flex items-center gap-1 hover:bg-slate-700">
                <i className="fa-solid fa-wallet"></i> Wallet
              </button>
            </div>
          </header>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 overflow-y-auto">
            
            {/* 1. HOME / FEED TAB */}
            {activeTab === 'home' && (
              <div className="relative h-[calc(100vh-130px)] bg-black overflow-hidden">
                {posts.length > 0 ? (
                  <div className="relative h-full w-full">
                    <video 
                      src={posts[0].videoUrl} 
                      className="w-full h-full object-cover" 
                      controls 
                      autoPlay 
                      loop 
                      muted 
                    />
                    <div className="absolute bottom-4 left-4 right-16 z-10 text-left">
                      <p className="font-bold text-pink-400">{posts[0].author}</p>
                      <p className="text-sm">{posts[0].caption}</p>
                    </div>
                  </div>
                ) : (
                  <div className="flex items-center justify-center h-full text-slate-500">
                    No videos available. Upload one!
                  </div>
                )}
              </div>
            )}

            {/* 2. LIVE FOREX MARKET TAB (TRADINGVIEW CHART) */}
            {activeTab === 'market' && (
              <div className="p-4 h-[calc(100vh-130px)] flex flex-col">
                <h2 className="text-lg font-bold mb-2">Live Forex & Crypto Market</h2>
                <div className="flex-1 bg-slate-800 rounded-lg overflow-hidden border border-slate-700 relative">
                  <iframe 
                    title="TradingView"
                    src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_1&symbol=FX%3AEURUSD&interval=D&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=dark&style=1&timezone=Etc%2FUTC"
                    className="w-full h-full border-none"
                  ></iframe>
                </div>
              </div>
            )}

            {/* 3. AI CHAT TAB */}
            {activeTab === 'aichat' && (
              <div className="p-4 flex flex-col h-[calc(100vh-130px)]">
                <div className="flex-1 bg-slate-800/50 p-4 rounded-lg overflow-y-auto mb-4 space-y-3">
                  <div className="bg-slate-800 p-3 rounded-lg max-w-[80%] text-sm">
                    Salam Umar bhai! Main aapka Smart AI Assistant hoon. Main aapki kya madad kar sakta hoon?
                  </div>
                </div>
                <div className="flex gap-2">
                  <input 
                    type="text" 
                    placeholder="Ask AI anything..." 
                    className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm outline-none focus:border-pink-500"
                  />
                  <button className="bg-pink-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-pink-700">
                    Send
                  </button>
                </div>
              </div>
            )}

            {/* 4. PROFILE TAB */}
            {activeTab === 'profile' && (
              <div className="p-4 space-y-6">
                <div className="flex flex-col items-center gap-2">
                  <img src={profile.avatar} alt="Profile" className="w-24 h-24 rounded-full border-2 border-pink-500 bg-slate-800" />
                  <h2 className="text-xl font-bold">{profile.name}</h2>
                  <p className="text-sm text-slate-400">{profile.bio}</p>
                </div>

                <form onSubmit={handleUpdateProfile} className="bg-slate-800 p-4 rounded-xl space-y-4 border border-slate-700">
                  <h3 className="font-semibold text-pink-400 text-sm">Edit Profile</h3>
                  <input name="newName" type="text" placeholder="New Name" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm" />
                  <input name="newBio" type="text" placeholder="New Bio" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm" />
                  <input name="avatarFile" type="file" accept="image/*" className="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-slate-700 file:text-white" />
                  <button type="submit" className="w-full bg-pink-600 py-2 rounded-lg text-sm font-semibold hover:bg-pink-700">
                    Update Profile
                  </button>
                </form>
              </div>
            )}
          </main>

          {/* BOTTOM NAVIGATION BAR */}
          <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/90 backdrop-blur border-t border-slate-800 flex justify-around items-center py-2 z-40">
            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center text-xs ${activeTab === 'home' ? 'text-pink-500' : 'text-slate-400'}`}>
              <i className="fa-solid fa-house text-lg"></i>
              <span>Home</span>
            </button>
            <button onClick={() => setActiveTab('market')} className={`flex flex-col items-center text-xs ${activeTab === 'market' ? 'text-pink-500' : 'text-slate-400'}`}>
              <i className="fa-solid fa-chart-line text-lg"></i>
              <span>Market</span>
            </button>
            <button onClick={() => setShowPostModal(true)} className="bg-pink-600 w-10 h-10 rounded-full flex items-center justify-center text-white text-xl shadow-lg hover:bg-pink-700">
              +
            </button>
            <button onClick={() => setActiveTab('aichat')} className={`flex flex-col items-center text-xs ${activeTab === 'aichat' ? 'text-pink-500' : 'text-slate-400'}`}>
              <i className="fa-solid fa-robot text-lg"></i>
              <span>AI Chat</span>
            </button>
            <button onClick={() => setActiveTab('profile')} className={`flex flex-col items-center text-xs ${activeTab === 'profile' ? 'text-pink-500' : 'text-slate-400'}`}>
              <i className="fa-solid fa-user text-lg"></i>
              <span>Profile</span>
            </button>
          </nav>

          {/* POST / VIDEO UPLOAD MODAL */}
          {showPostModal && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-slate-800 w-full max-w-sm rounded-xl p-4 space-y-4 border border-slate-700">
                <div className="flex justify-between items-center">
                  <h3 className="font-bold text-pink-400">Create New Post</h3>
                  <button onClick={() => setShowPostModal(false)} className="text-slate-400 text-lg">&times;</button>
                </div>
                <form onSubmit={handlePublishPost} className="space-y-3">
                  <textarea name="caption" placeholder="Write caption or hashtags..." className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm h-20 outline-none"></textarea>
                  <input name="videoFile" type="file" accept="video/*" className="w-full text-xs text-slate-400 file:mr-2 file:py-2 file:px-4 file:rounded file:border-0 file:bg-slate-700 file:text-white" />
                  <button type="submit" className="w-full bg-pink-600 py-2 rounded-lg text-sm font-semibold hover:bg-pink-700">
                    Publish Post
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* CODE PLAYGROUND MODAL (WITH ERROR HANDLING) */}
          {showCodeModal && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-slate-800 w-full max-w-sm rounded-xl p-4 space-y-4 border border-slate-700">
                <div className="flex justify-between items-center">
                  <h3 className="font-bold text-pink-400">Code Playground</h3>
                  <button onClick={() => setShowCodeModal(false)} className="text-slate-400 text-lg">&times;</button>
                </div>
                <textarea id="codeEditor" defaultValue="console.log('Hello World');" className="w-full bg-slate-900 font-mono border border-slate-700 rounded p-2 text-xs h-32 outline-none text-green-400"></textarea>
                <button 
                  onClick={() => {
                    const code = document.getElementById('codeEditor').value;
                    try {
                      new Function(code)();
                      showToast('Code executed without errors! ✅');
                    } catch (err) {
                      showToast(`Syntax/Runtime Error: ${err.message}`, 'error');
                    }
                  }} 
                  className="w-full bg-pink-600 py-2 rounded-lg text-sm font-semibold hover:bg-pink-700"
                >
                  Run JS Code
                </button>
              </div>
            </div>
          )}

          {/* WALLET MODAL */}
          {showWalletModal && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-slate-800 w-full max-w-sm rounded-xl p-4 space-y-4 border border-slate-700 text-center">
                <div className="flex justify-between items-center">
                  <h3 className="font-bold text-pink-400">Umar Super Wallet</h3>
                  <button onClick={() => setShowWalletModal(false)} className="text-slate-400 text-lg">&times;</button>
                </div>
                <div className="bg-slate-900 p-4 rounded-lg">
                  <p className="text-xs text-slate-400">Total Balance</p>
                  <p className="text-2xl font-bold text-emerald-400">PKR 25,400.00</p>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => showToast('Deposit Gateway opening...')} className="bg-emerald-600 py-2 rounded-lg text-xs font-semibold">Deposit</button>
                  <button onClick={() => showToast('Withdrawal request initiated.')} className="bg-rose-600 py-2 rounded-lg text-xs font-semibold">Withdraw</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
