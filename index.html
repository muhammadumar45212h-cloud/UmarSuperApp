<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white h-screen overflow-hidden">

<div id="content" class="h-[calc(100vh-80px)] overflow-y-auto p-4"></div>

<!-- Navigation -->
<nav class="fixed bottom-0 w-full h-[80px] bg-gray-900 flex justify-around items-center border-t border-gray-800">
    <button onclick="renderPage('home')">🏠</button>
    <button onclick="renderPage('profile')">👤</button>
    <button onclick="alert('Upload Logic Here')" class="bg-blue-600 rounded-full w-14 h-14">+</button>
    <button onclick="renderPage('chat')">💬</button>
    <button onclick="renderPage('market')">📈</button>
</nav>

<script>
function renderPage(page) {
    const content = document.getElementById('content');
    if (page === 'home') {
        content.innerHTML = `
            <div class="h-full flex flex-col justify-end pb-10">
                <div class="flex flex-col gap-6 items-end text-2xl">
                    <button>❤️</button><span>Like</span>
                    <button>💬</button><span>Comment</span>
                    <button>➤</button><span>Share</span>
                    <button>🔔</button><span>Sub</span>
                </div>
            </div>`;
    } else if (page === 'profile') {
        content.innerHTML = `
            <div class="flex justify-between"><span>...</span><button>Edit</button></div>
            <div class="w-24 h-24 rounded-full bg-gray-700 mx-auto mt-4"></div>
            <div class="flex justify-around mt-4 border-b border-gray-700 pb-4">
                <span>Subs</span><span>Posts</span><span>Likes</span>
            </div>
            <div class="grid grid-cols-3 gap-2 mt-4">
                <!-- User Posts Grid -->
                <div class="aspect-square bg-gray-800"></div>
            </div>`;
    } else if (page === 'market') {
        content.innerHTML = `
            <div class="pt-10 h-full"> <!-- Nishan ke mutabiq jagah chori -->
                <div id="tv_chart" class="h-4/5 w-full"></div>
            </div>`;
    }
}
renderPage('home');
</script>
</body>
</html>
