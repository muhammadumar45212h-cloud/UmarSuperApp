<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: black; color: white; margin: 0; }
        .nav-btn.active { color: #3b82f6; }
    </style>
</head>
<body>

    <!-- Content Screen -->
    <div id="content" class="h-[calc(100vh-80px)] w-full overflow-y-auto"></div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full h-[80px] bg-gray-900 flex justify-around items-center border-t border-gray-800">
        <button class="nav-btn" onclick="loadPage('home')">🏠</button>
        <button class="nav-btn" onclick="loadPage('profile')">👤</button>
        <button class="bg-blue-600 rounded-full w-14 h-14" onclick="openPostModal()">+</button>
        <button class="nav-btn" onclick="loadPage('chat')">💬</button>
        <button class="nav-btn" onclick="loadPage('market')">📈</button>
    </nav>

    <!-- Modal for Post -->
    <div id="postModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-xl w-4/5 text-center">
            <h3 class="mb-4">Select Video from Gallery</h3>
            <input type="file" id="videoInput" accept="video/*" class="mb-4">
            <button class="bg-blue-600 px-6 py-2 rounded" onclick="uploadVideo()">Upload</button>
        </div>
    </div>

<script>
function loadPage(page) {
    const content = document.getElementById('content');
    if (page === 'home') {
        content.innerHTML = `<div class="p-4 flex flex-col justify-end h-full">
            <div class="space-y-4 text-right mb-10">
                <button>❤️ Like</button> <button>💬 Comment</button> <button>➤ Share</button> <button>🔔 Sub</button>
            </div>
        </div>`;
    } else if (page === 'market') {
        content.innerHTML = `<div id="tv_chart" class="h-full w-full pt-10"></div>`;
        new TradingView.widget({ "container_id": "tv_chart", "symbol": "FX:XAUUSD", "theme": "dark", "autosize": true });
    } else if (page === 'profile') {
        content.innerHTML = `<div class="p-6 text-center">
            <div class="flex justify-between mb-4"><span>...</span><button class="text-blue-500">Edit</button></div>
            <div class="w-24 h-24 rounded-full bg-gray-600 mx-auto"></div>
            <div class="flex justify-around mt-6 border-b border-gray-700 pb-4">
                <span>Subs</span> <span>Posts</span> <span>Likes</span>
            </div>
        </div>`;
    } else if (page === 'chat') {
        content.innerHTML = `<div class="p-10 text-center">Chat System Initialized</div>`;
    }
}

function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
function uploadVideo() { alert('Connecting to Server...'); }

loadPage('home');
</script>
</body>
</html>
