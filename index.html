<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Dynamic Header -->
    <header class="top-bar" id="appHeader">
        <div class="logo">Super App</div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" placeholder="Search profiles, videos...">
        </div>
        <div class="top-icons">
            <i class="fa-regular fa-bell"></i>
            <i class="fa-solid fa-ellipsis-vertical" onclick="openFullSettings()"></i>
        </div>
    </header>

    <!-- Main Screens View -->
    <main class="main-content">

        <!-- 1. TikTok Style Full-Screen Reels -->
        <section id="tab-reels" class="tab-page active">
            <div id="reelsContainer" class="reels-vertical-container">
                <!-- Reels dynamically render hongi -->
            </div>
        </section>

        <!-- 2. Text Feed Page -->
        <section id="tab-textfeed" class="tab-page">
            <div class="create-post-card">
                <div class="post-header">
                    <img src="https://via.placeholder.com/45" class="avatar-small">
                    <textarea id="textPostInput" placeholder="What's on your mind?"></textarea>
                </div>
                <button class="btn-post" onclick="publishTextPost()"><i class="fa-solid fa-paper-plane"></i> Post</button>
            </div>
            <div id="textPostsContainer" class="text-feed-list"></div>
        </section>

        <!-- 3. Advanced Gallery & Voice Chat Page -->
        <section id="tab-chat" class="tab-page">
            <div class="chat-wrapper">
                <div id="chatMessages" class="chat-messages-area"></div>
                <div class="chat-bottom-bar">
                    <button class="chat-icon-btn" onclick="triggerGallery()"><i class="fa-solid fa-image"></i></button>
                    <input type="file" id="chatGalleryInput" accept="image/*" class="hidden" onchange="sendGalleryPhoto(event)">
                    <input type="text" id="chatInput" placeholder="Type a message...">
                    <button class="chat-icon-btn"><i class="fa-solid fa-microphone"></i></button>
                    <button class="btn-send-chat" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </section>

        <!-- 4. Interactive Code IDE -->
        <section id="tab-ide" class="tab-page">
            <div class="ide-container">
                <h3><i class="fa-solid fa-code"></i> Mobile IDE Runner</h3>
                <textarea id="codeEditor" class="code-editor" placeholder="Write HTML/CSS/JS here..."></textarea>
                <button class="btn-run" onclick="runCode()"><i class="fa-solid fa-play"></i> Run Code</button>
                <div class="preview-title">Live Output:</div>
                <iframe id="codeOutput" class="code-preview" title="Output"></iframe>
            </div>
        </section>

        <!-- 5. Profile Tab -->
        <section id="tab-profile" class="tab-page">
            <div class="profile-header">
                <img id="userAvatarImg" src="https://via.placeholder.com/100" class="profile-pic">
                <h2 id="profileUsername">@umar_developer</h2>
                <p id="profileBio">Building the Super App Platform 🚀</p>
            </div>
            <div class="profile-videos-title">My Videos</div>
            <div id="myVideosGrid" class="profile-grid"></div>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('reels', this)"><i class="fa-solid fa-film"></i><span>Reels</span></button>
        <button class="nav-item" onclick="switchTab('textfeed', this)"><i class="fa-solid fa-font"></i><span>Text Feed</span></button>
        <button class="nav-item" onclick="switchTab('chat', this)"><i class="fa-solid fa-comments"></i><span>Chat</span></button>
        <button class="nav-item plus-btn" onclick="openUploadModal()"><div class="plus-icon"><i class="fa-solid fa-plus"></i></div></button>
        <button class="nav-item" onclick="switchTab('ide', this)"><i class="fa-solid fa-code"></i><span>IDE</span></button>
        <button class="nav-item" onclick="switchTab('profile', this)"><i class="fa-solid fa-user"></i><span>Profile</span></button>
    </nav>

    <!-- Full-Screen Settings Page -->
    <div id="fullSettingsPage" class="full-screen-settings hidden">
        <div class="settings-header">
            <i class="fa-solid fa-arrow-left" onclick="closeFullSettings()"></i>
            <h2>Settings & Account</h2>
        </div>
        <div class="settings-content">
            <div class="setting-item"><i class="fa-solid fa-id-card"></i> <span>Account & ID Info</span></div>
            <div class="setting-item"><i class="fa-solid fa-palette"></i> <span>Theme Color</span> 
                <input type="color" id="themeColorPicker" onchange="changeAppTheme(this.value)">
            </div>
            <div class="setting-item"><i class="fa-solid fa-download"></i> <span>Downloaded Videos</span></div>
            
            <!-- Real Balance Wallet -->
            <div class="wallet-card">
                <h3>Real Balance Wallet</h3>
                <div class="balance-display" id="walletBalance">Rs. 2,500.00</div>
                <div class="wallet-actions">
                    <button class="btn-deposit" onclick="depositMoney()">Deposit</button>
                    <button class="btn-withdraw" onclick="withdrawMoney()">Withdraw</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Comments Sheet Overlay -->
    <div id="commentsDrawer" class="comments-drawer hidden">
        <div class="drawer-header">
            <span>Comments</span>
            <i class="fa-solid fa-xmark" onclick="closeComments()"></i>
        </div>
        <div id="commentsList" class="comments-list"></div>
        <div class="comment-input-box">
            <input type="text" id="newCommentInput" placeholder="Add a comment...">
            <button onclick="addComment()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>Upload Reel</h3>
            <input type="file" id="modalFileInput" accept="video/*">
            <input type="text" id="mediaCaption" class="input-dark margin-top" placeholder="Add caption & #hashtags...">
            <button class="btn-post margin-top" onclick="publishMedia()">Publish Reel</button>
            <button class="btn-cancel" onclick="closeUploadModal()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
