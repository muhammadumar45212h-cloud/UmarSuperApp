<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umar Super App</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: Roboto, Arial;}
body {background:#0f0f0f; color:#fff;}
header {position:sticky; top:0; background:#0f0f0f; padding:10px; border-bottom:1px solid #222; z-index:100;}
.search-bar {width:100%; padding:10px; border-radius:20px; border:none; background:#222; color:#fff;}
.profile {text-align:center; padding:30px 20px; border-bottom:1px solid #222;}
.profile img {width:120px; height:120px; border-radius:50%; border:3px solid #ff0000;}
.profile h2 {margin:10px 0 5px;}
.profile p {color:#aaa; font-size:14px; margin-bottom:10px;}
.sub-btn {background:#ff0000; border:none; padding:10px 30px; border-radius:20px; color:#fff; font-weight:bold; cursor:pointer;}
.sub-btn.subscribed {background:#555;}
.stats {display:flex; justify-content:space-around; padding:15px; border-bottom:1px solid #222;}
.stat {text-align:center;}
.video-grid {display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:10px; padding:10px;}
.video-card {cursor:pointer;}
.video-card img {width:100%; border-radius:10px;}
.video-info {padding:8px;}
.actions {display:flex; gap:15px; padding:8px; color:#aaa;}
.actions span {cursor:pointer;}
.actions span:hover {color:#fff;}
.chat-box {position:fixed; bottom:0; right:20px; width:300px; height:400px; background:#1a1a1a; border:1px solid #333; border-radius:10px 10px 0 0; display:none; flex-direction:column;}
.chat-header {padding:10px; background:#ff0000; border-radius:10px 10px 0 0; cursor:pointer;}
.chat-body {flex:1; overflow-y:auto; padding:10px;}
.chat-input {display:flex; padding:5px; border-top:1px solid #333;}
.chat-input input {flex:1; background:#222; border:none; padding:8px; color:#fff; border-radius:5px;}
.chat-input button {background:#ff0000; border:none; padding:8px 15px; margin-left:5px; border-radius:5px; color:#fff; cursor:pointer;}
.msg {margin:5px 0; padding:5px 10px; background:#333; border-radius:10px; max-width:80%;}
</style>
</head>
<body>

<header>
<input class="search-bar" id="search" placeholder="Search" onkeyup="searchVideos()">
</header>

<div class="profile">
<img id="profilePic" src="https://i.pravatar.cc/200" alt="Profile">
<h2 id="userName">Umar Khan</h2>
<p id="userBio">Loading bio...</p>
<button class="sub-btn" id="subBtn" onclick="toggleSub()">Subscribe</button>
</div>

<div class="stats">
<div class="stat"><b id="subCount">0</b><br>Subscribers</div>
<div class="stat"><b id="videoCount">0</b><br>Videos</div>
</div>

<div class="video-grid" id="videoGrid"></div>

<div class="chat-box" id="chatBox">
<div class="chat-header" onclick="toggleChat()">💬 Messages</div>
<div class="chat-body" id="chatBody"></div>
<div class="chat-input">
<input id="chatInput" placeholder="Message..." onkeypress="if(event.key=='Enter') sendMsg()">
<button onclick="sendMsg()">Send</button>
</div>
</div>
<button style="position:fixed; bottom:20px; right:20px; background:#ff0000; border:none; padding:15px; border-radius:50%; font-size:20px; cursor:pointer;" onclick="toggleChat()">💬</button>

<script>
const API = '/api';
const userId = 'muhammadumar45212h-cloud';

// Profile load
fetch(`${API}/profile/${userId}`).then(r=>r.json()).then(d=>{
document.getElementById('profilePic').src = d.photo;
document.getElementById('userName').innerText = d.name;
document.getElementById('userBio').innerText = d.bio;
document.getElementById('subCount').innerText = d.subs;
document.getElementById('subBtn').innerText = d.isSubscribed ? 'Subscribed' : 'Subscribe';
document.getElementById('subBtn').classList.toggle('subscribed', d.isSubscribed);
});

// Videos load
function loadVideos(q=''){
fetch(`${API}/videos?search=${q}`).then(r=>r.json()).then(videos=>{
document.getElementById('videoCount').innerText = videos.length;
document.getElementById('videoGrid').innerHTML = videos.map(v=>`
<div class="video-card">
<img src="${v.thumbnail}">
<div class="video-info">
<b>${v.title}</b><br>
<small>${v.views} views</small>
</div>
<div class="actions">
<span onclick="like('${v.id}')">👍 ${v.likes}</span>
<span onclick="comment('${v.id}')">💬 ${v.comments}</span>
<span onclick="share('${v.id}')">↗️ ${v.shares}</span>
<span onclick="toggleAudio('${v.id}')">${v.audio ? '🔊' : '🔇'}</span>
</div>
</div>
`).join('');
});
}
loadVideos();

// Subscribe
function toggleSub(){
fetch(`${API}/subscribe`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, targetId:'umar123'})})
.then(r=>r.json()).then(d=>{
document.getElementById('subCount').innerText = d.subs;
document.getElementById('subBtn').innerText = d.subscribed ? 'Subscribed' : 'Subscribe';
document.getElementById('subBtn').classList.toggle('subscribed', d.subscribed);
});
}

// Like/Comment/Share
function like(id){
fetch(`${API}/like`, {method:'POST', body:JSON.stringify({videoId:id, userId})})
.then(r=>r.json()).then(()=>loadVideos(document.getElementById('search').value));
}
function comment(id){ let c=prompt('Comment:'); if(c) fetch(`${API}/comment`,{method:'POST',body:JSON.stringify({videoId:id,userId,text:c})}).then(()=>loadVideos()); }
function share(id){ fetch(`${API}/share`,{method:'POST',body:JSON.stringify({videoId:id,userId})}).then(()=>loadVideos()); }

// Search
function searchVideos(){ loadVideos(document.getElementById('search').value); }

// Chat
function toggleChat(){ document.getElementById('chatBox').style.display = document.getElementById('chatBox').style.display=='flex'?'none':'flex'; loadChat(); }
function loadChat(){
fetch(`${API}/chat/${userId}`).then(r=>r.json()).then(msgs=>{
document.getElementById('chatBody').innerHTML = msgs.map(m=>`<div class="msg"><b>${m.from}:</b> ${m.text}</div>`).join('');
});
setTimeout(loadChat, 2000); // 2 sec me auto refresh = live chat
}
function sendMsg(){
let txt = document.getElementById('chatInput').value;
if(txt) fetch(`${API}/chat/send`,{method:'POST',body:JSON.stringify({from:userId,to:'all',text:txt})}).then(()=>{document.getElementById('chatInput').value=''; loadChat();});
}

// Audio toggle
function toggleAudio(id){ fetch(`${API}/audio/${id}`,{method:'POST'}).then(()=>loadVideos()); }
</script>
</body>
</html>
