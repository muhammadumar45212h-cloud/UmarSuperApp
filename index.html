<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: black; color: white; }</style>
</head>
<body class="pb-20">

<div id="content" class="h-screen w-full"></div>

<!-- Nav Bar -->
<div class="fixed bottom-0 w-full h-16 bg-gray-900 flex justify-around items-center border-t border-gray-800 z-50">
  <button onclick="showPage('home')">🏠</button>
  <button onclick="showPage('profile')">👤</button>
  <button onclick="showPost()" class="bg-blue-600 w-14 h-14 rounded-full text-3xl font-bold -mt-8">+</button>
  <button onclick="showPage('chat')">💬</button>
  <button onclick="showPage('market')">📈</button>
</div>

<script>
function showPage(page) {
  const content = document.getElementById('content');
  if(page === 'home') {
    content.innerHTML = `
      <div class="snap-y snap-mandatory h-screen overflow-y-scroll">
        <div class="snap-start h-screen relative flex items-center justify-center bg-gray-900">
          <p>Video Feed Here</p>
          <div class="absolute right-4 bottom-20 flex flex-col gap-6 text-2xl">
            <span>❤️</span><span>💬</span><span>↪️</span><span>➕</span>
          </div>
        </div>
      </div>`;
  } else if(page === 'profile') {
    content.innerHTML = `
      <div class="p-4 flex flex-col items-center pt-10">
        <img src="https://i.pravatar.cc/150" class="w-24 h-24 rounded-full border-2 border-blue-500">
        <h3 class="text-xl font-bold mt-2">Umar Boss</h3>
        <div class="flex gap-8 mt-4">
          <div class="text-center"><p class="font-bold">10</p><p class="text-xs">Posts</p></div>
          <div class="text-center"><p class="font-bold">1.2K</p><p class="text-xs">Subs</p></div>
          <div class="text-center"><p class="font-bold">50K</p><p class="text-xs">Likes</p></div>
        </div>
        <div class="grid grid-cols-3 gap-1 mt-6 w-full">
          ${[...Array(9)].map(() => '<div class="aspect-square bg-gray-800"></div>').join('')}
        </div>
      </div>`;
  } else if(page === 'market') {
    content.innerHTML = `<div id="tv_chart" class="h-screen w-full"></div>`;
    loadTV();
  } else if(page === 'chat') {
    content.innerHTML = `<div class="p-4 text-center pt-20">WhatsApp Style Chat Coming Soon</div>`;
  }
}

function loadTV() {
  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/tv.js';
  s.onload = () => new TradingView.widget({container_id: 'tv_chart', symbol: 'FX:XAUUSD', theme: 'dark', autosize: true});
  document.body.appendChild(s);
}

function showPost() { alert("File Selector Open..."); }
showPage('home');
</script>
</body>
</html>
