<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super App</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-9780067506108310~3493198071" crossorigin="anonymous"></script>
</head>
<body>

<!-- LOGIN BOX -->
<div id="authBox" class="modal-card" style="margin:100px auto">
  <h2>Super App Login</h2>
  <input id="email" class="input-dark" type="email" placeholder="Email">
  <input id="pass" class="input-dark" type="password" placeholder="Password">
  <button class="btn-pink" onclick="login()">Login</button>
  <button class="btn-secondary" onclick="signup()">Sign Up</button>
  <p id="authMsg" style="color:#ef4444"></p>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
<header class="top-bar">
    <div class="logo">Super App</div>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" placeholder="Search profiles, videos, channel...">
    </div>
    <div class="top-icons">
        <i class="fa-solid fa-video" onclick="goLive()"></i>
        <i class="fa-regular fa-bell"></i>
        <i class="fa-solid fa-ellipsis-vertical" onclick="openSettings()"></i>
    </div>
</header>

<main class="main-content">
    <section id="tab-reels" class="tab-page active"><div id="videoFeed" class="reels-container"></div></section>
    <section id="tab-textfeed" class="tab-page"><div class="card"><h2>Text Posts</h2><div id="textPostsContainer"></div></div></section>
    <section id="tab-chat" class="tab-page"><div class="card"><h2>Live Chat</h2><div id="chatMessages" class="chat-box"></div><div class="chat-input-row"><input type="text" id="chatInput" placeholder="Type..."><button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button></div></div></section>
    <section id="tab-forex" class="tab-page"><h2 class="section-title">Live Market</h2><select id="marketPairSelect" onchange="changeMarketChart()" class="input-dark"><option value="FX:XAUUSD">Gold</option><option value="BINANCE:BTCUSDT">Bitcoin</option></select><div id="tradingview_widget" class="chart-container"></div></section>
    <section id="tab-weather" class="tab-page"><h2 class="section-title">Weather</h2><div class="weather-search"><input type="text" id="cityInput" class="input-dark" placeholder="Enter City"><button class="btn-primary" onclick="getWeather()">Search</button></div><div class="weather-display"><h1 id="cityName">City</h1><h2 id="cityTemp">--°C</h2><p id="cityDesc">--</p></div></section>
    <section id="tab-profile" class="tab-page"><div class="profile-header"><img id="userAvatarImg" src="https://via.placeholder.com/100" class="avatar-circle"><h2 id="profileDisplayName">User</h2><p id="profileUsername">@user</p><button class="btn-secondary" onclick="editProfile()">Edit Profile</button></div><div id="myVideosGrid"></div></section>
</main>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('reels', this)"><i class="fa-solid fa-film"></i><span>Reels</span></button>
    <button class="nav-item" onclick="switchTab('chat', this)"><i class="fa-solid fa-comments"></i><span>Chat</span></button>
    <button class="nav-item plus-btn" onclick="openUploadModal()"><div class="plus-icon"><i class="fa-solid fa-plus"></i></div></button>
    <button class="nav-item" onclick="switchTab('forex', this)"><i class="fa-solid fa-chart-line"></i><span>Forex</span></button>
    <button class="nav-item" onclick="switchTab('profile', this)"><i class="fa-solid fa-user"></i><span>Profile</span></button>
</nav>

<!-- UPLOAD MODAL -->
<div id="uploadModal" class="modal-overlay hidden"><div class="modal-card">
<h3>Upload Video</h3>
<div class="file-picker-btn" onclick="document.getElementById('modalFileInput').click()"><i class="fa-solid fa-folder-open"></i> Choose Video</div>
<input type="file" id="modalFileInput" accept="video/*" class="hidden" onchange="previewMedia(event)">
<div id="previewBox" class="preview-box hidden"></div>
<input type="text" id="mediaCaption" class="input-dark" placeholder="Add caption #tag">
<select id="privacy" class="input-dark"><option>Public</option><option>Private</option></select>
<button class="btn-pink" onclick="publishMedia()">Publish</button>
<button class="btn-link" onclick="closeUploadModal()">Cancel</button>
</div></div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="modal-overlay hidden"><div class="modal-card">
<h2>Settings</h2>
<div class="info-card wallet-card"><i class="fa-solid fa-wallet"></i><h1 id="walletBalance">Rs. 0.00</h1></div>
<button class="btn-red" onclick="logoutUser()">Logout</button>
<button class="btn-link" onclick="closeSettingsModal()">Close</button>
</div></div>

</div>

</body>
</html>
