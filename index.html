<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TradingView Widget Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-white h-screen w-full m-0 p-0 overflow-hidden">

    <!-- Fullscreen Content Area -->
    <div id="content" class="h-[calc(100vh-80px)] w-full overflow-y-auto"></div>

    <!-- Navigation -->
    <nav class="h-[80px] w-full bg-gray-900 flex justify-around items-center border-t border-gray-800 fixed bottom-0">
        <button onclick="renderPage('home')">🏠</button>
        <button onclick="renderPage('profile')">👤</button>
        <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-blue-600 rounded-full w-14 h-14 text-2xl">+</button>
        <button onclick="renderPage('chat')">💬</button>
        <button onclick="renderPage('market')">📈</button>
    </nav>

    <!-- Post Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-xl w-4/5">
            <input type="file" class="w-full mb-4">
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="bg-blue-600 w-full py-2 rounded">Post Video</button>
        </div>
    </div>

<script>
function renderPage(page) {
    const content = document.getElementById('content');
    if (page === 'home') {
        content.innerHTML = `<div class="p-4">Video Feed (Full Screen)</div>`;
    } else if (page === 'market') {
        content.innerHTML = `<div id="tradingview_chart" class="h-full w-full"></div>`;
        new TradingView.widget({
            "container_id": "tradingview_chart",
            "symbol": "FX:XAUUSD",
            "theme": "dark",
            "autosize": true
        });
    } else if (page === 'profile') {
        content.innerHTML = `<div class="text-center pt-10">Profile Content</div>`;
    }
}
renderPage('home');
</script>
</body>
</html>
