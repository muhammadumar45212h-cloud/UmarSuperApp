<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #0b111e; color: #ffffff; padding-bottom: 70px; }
    
    /* Header & Navigation */
    header { background: #111927; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f293d; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 20px; font-weight: bold; }
    .search-box { display: flex; align-items: center; background: #1c2536; padding: 6px 12px; border-radius: 20px; width: 60%; }
    .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 8px; }
    
    /* Input Styling Updates */
    textarea, input[type="text"] {
      width: 100%;
      background: #1c2536;
      border: 1px solid #2b384e;
      border-radius: 8px;
      color: #fff;
      padding: 12px;
      font-size: 15px;
      outline: none;
      resize: vertical;
    }
    textarea.spacious { min-height: 110px; }

    /* Buttons */
    .btn { background: #e91e63; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-secondary { background: #2b384e; }
    
    /* Feed Sections */
    .section { display: none; padding: 16px; }
    .section.active { display: block; }
    
    /* Reels Player */
    .reel-card { position: relative; width: 100%; height: 80vh; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .reel-overlay { position: absolute; bottom: 20px; left: 16px; right: 60px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
    .reel-actions { position: absolute; right: 16px; bottom: 40px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .action-btn { background: rgba(0,0,0,0.4); border-radius: 50%; padding: 10px; cursor: pointer; text-align: center; font-size: 12px; }

    /* Posts & Feed */
    .post-card { background: #111927; padding: 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #1f293d; }
    .post-card a { color: #38ef7d; text-decoration: underline; word-break: break-all; }
    .post-actions { display: flex; gap: 16px; margin-top: 12px; font-size: 14px; color: #a0aec0; }

    /* Long-Press Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: #111927; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

    /* Bottom Nav Bar */
    nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111927; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1f293d; z-index: 100; }
    .nav-item { color: #a0aec0; text-decoration: none; font-size: 11px; text-align: center; }
    .nav-item.active { color: #e91e63; }
    .add-btn { background: linear-gradient(135deg, #e91e63, #9c27b0); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -15px; font-size: 20px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Super App</div>
    <div class="search-box">
      🔍 <input type="text" id="globalSearch" placeholder="Search profiles, videos..." onkeyup="handleSearch()">
    </div>
  </header>

  <!-- REELS FEED SECTION -->
  <div id="reels-sec" class="section active">
    <div id="reelsContainer"></div>
  </div>

  <!-- TEXT FEED SECTION -->
  <div id="textfeed-sec" class="section">
    <div style="margin-bottom: 16px;">
      <textarea id="textPostInput" class="spacious" placeholder="Share what's on your mind... (Links are auto-formatted)"></textarea>
      <button class="btn" style="margin-top: 8px;" onclick="addTextPost()">✈️ Post</button>
    </div>
    <div id="textPostContainer"></div>
  </div>

  <!-- CHAT SECTION -->
  <div id="chat-sec" class="section">
    <h3>Chats & Groups</h3>
    <div id="chatList" style="margin-top: 12px;"></div>
  </div>

  <!-- IDE SECTION -->
  <div id="ide-sec" class="section">
    <h3> Mobile Code IDE</h3>
    <textarea id="ideCode" class="spacious" style="font-family: monospace; margin-top: 10px;" placeholder='print("hello world")'></textarea>
    <button class="btn" style="margin-top: 8px;" onclick="runCode()">▶ Run Code</button>
    <div style="margin-top: 16px;">
      <strong>Terminal Output:</strong>
      <pre id="ideOutput" style="background: #000; padding: 12px; border-radius: 8px; margin-top: 6px; color: #38ef7d; min-height: 80px;">Ready...</pre>
    </div>
  </div>

  <!-- PROFILE SECTION -->
  <div id="profile-sec" class="section">
    <div style="text-align: center; padding: 20px 0;">
      <img id="profilePic" src="https://via.placeholder.com/100" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid #e91e63;">
      <h2 id="profileUsername">@umar_developer</h2>
      <p id="profileBio" style="color: #a0aec0; margin: 8px 0;">Building the Super App Platform 🚀</p>
      <button class="btn btn-secondary" onclick="openProfileEdit()">✏️ Edit Profile</button>
    </div>
  </div>

  <!-- LONG PRESS MODAL -->
  <div id="longPressModal" class="modal">
    <div class="modal-content">
      <h3>Post Options</h3>
      <button class="btn btn-secondary" onclick="forwardPost()">↗️ Forward</button>
      <button class="btn btn-secondary" onclick="copyPostText()">📋 Copy Text</button>
      <button class="btn btn-secondary" style="color: #ff5252;" onclick="reportPost()">⚠️ Report ID</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <!-- EDIT PROFILE MODAL -->
  <div id="editProfileModal" class="modal">
    <div class="modal-content">
      <h3>Edit Profile</h3>
      <input type="text" id="editUsername" placeholder="Username">
      <textarea id="editBio" class="spacious" placeholder="Bio (Links allowed)"></textarea>
      <button class="btn" onclick="saveProfile()">Save Changes</button>
      <button class="btn btn-secondary" onclick="closeProfileModal()">Cancel</button>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <nav>
    <a href="#" class="nav-item active" onclick="switchTab('reels-sec', this)">Reels</a>
    <a href="#" class="nav-item" onclick="switchTab('textfeed-sec', this)">Text Feed</a>
    <a href="#" class="nav-item" onclick="switchTab('chat-sec', this)">Chat</a>
    <div class="add-btn" onclick="openUploadModal()">+</div>
    <a href="#" class="nav-item" onclick="switchTab('ide-sec', this)">IDE</a>
    <a href="#" class="nav-item" onclick="switchTab('profile-sec', this)">Profile</a>
  </nav>

  <script>
    // App State Management & LocalStorage Persistence
    let state = {
      user: JSON.parse(localStorage.getItem('user_profile')) || { username: 'umar_developer', bio: 'Building the Super App Platform 🚀' },
      posts: JSON.parse(localStorage.getItem('app_posts')) || [],
      selectedPostText: ''
    };

    function initApp() {
      document.getElementById('profileUsername').innerText = '@' + state.user.username;
      document.getElementById('profileBio').innerHTML = formatLinks(state.user.bio);
      renderPosts();
    }

    // Auto Link Formatter
    function formatLinks(text) {
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, function(url) {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
      });
    }

    // Tab Switcher
    function switchTab(tabId, element) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      if (element) element.classList.add('active');
    }

    // Text Post Handling
    function addTextPost() {
      const input = document.getElementById('textPostInput');
      if (!input.value.trim()) return;

      const newPost = {
        id: Date.now(),
        author: state.user.username,
        text: input.value,
        likes: 0,
        liked: false
      };

      state.posts.unshift(newPost);
      localStorage.setItem('app_posts', JSON.stringify(state.posts));
      input.value = '';
      renderPosts();
    }

    function renderPosts() {
      const container = document.getElementById('textPostContainer');
      container.innerHTML = '';
      state.posts.forEach(post => {
        const div = document.createElement('div');
        div.className = 'post-card';
        div.innerHTML = `
          <strong>@${post.author}</strong>
          <p style="margin-top: 8px;">${formatLinks(post.text)}</p>
          <div class="post-actions">
            <span onclick="toggleLike(${post.id})" style="cursor:pointer;">❤️ ${post.likes}</span>
            <span>💬 Comment</span>
            <span>↪️ Share</span>
          </div>
        `;
        
        // Long Press Gesture Handler (2 Seconds)
        let timer;
        div.addEventListener('touchstart', () => { timer = setTimeout(() => triggerLongPress(post.text), 2000); });
        div.addEventListener('touchend', () => clearTimeout(timer));
        div.addEventListener('mousedown', () => { timer = setTimeout(() => triggerLongPress(post.text), 2000); });
        div.addEventListener('mouseup', () => clearTimeout(timer));

        container.appendChild(div);
      });
    }

    // Toggle Likes Fix (1 Per User)
    function toggleLike(id) {
      const post = state.posts.find(p => p.id === id);
      if (post) {
        post.liked = !post.liked;
        post.likes += post.liked ? 1 : -1;
        localStorage.setItem('app_posts', JSON.stringify(state.posts));
        renderPosts();
      }
    }

    // Long Press Modal & Actions
    function triggerLongPress(text) {
      state.selectedPostText = text;
      document.getElementById('longPressModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('longPressModal').style.display = 'none'; }

    function copyPostText() {
      navigator.clipboard.writeText(state.selectedPostText);
      alert("Text copied to clipboard!");
      closeModal();
    }

    function forwardPost() {
      alert(`Forwarded by @${state.user.username}:\n"${state.selectedPostText}"`);
      closeModal();
    }

    function reportPost() {
      alert("Post/ID reported successfully.");
      closeModal();
    }

    // Profile Edit
    function openProfileEdit() {
      document.getElementById('editUsername').value = state.user.username;
      document.getElementById('editBio').value = state.user.bio;
      document.getElementById('editProfileModal').style.display = 'flex';
    }

    function closeProfileModal() { document.getElementById('editProfileModal').style.display = 'none'; }

    function saveProfile() {
      state.user.username = document.getElementById('editUsername').value;
      state.user.bio = document.getElementById('editBio').value;
      localStorage.setItem('user_profile', JSON.stringify(state.user));
      initApp();
      closeProfileModal();
    }

    // Python / Code Execution Logic
    function runCode() {
      const code = document.getElementById('ideCode').value;
      const output = document.getElementById('ideOutput');
      
      // Basic Python Print Parser Simulation
      if (code.includes('print(')) {
        const match = code.match(/print\((["'])(.*?)\1\)/);
        if (match) {
          output.innerText = match[2];
          return;
        }
      }
      try {
        output.innerText = eval(code);
      } catch (err) {
        output.innerText = err.message;
      }
    }

    // Initialize Application
    initApp();
  </script>
</body>
</html>
