<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-white h-screen overflow-hidden">

<!-- Login Screen -->
<div id="loginScreen" class="absolute inset-0 z-50 bg-black flex flex-col items-center justify-center">
    <input type="text" placeholder="Username" class="bg-gray-800 p-2 mb-2 rounded">
    <button onclick="document.getElementById('loginScreen').style.display='none'" class="bg-blue-600 px-6 py-2 rounded">Login</button>
</div>

<!-- Top Search Bar -->
<div class="h-[50px] flex items-center px-4 border-b border-gray-800">
    <input type="text" placeholder="🔍 Search..." class="w-full bg-transparent outline-none">
</div>

<!-- Main Content -->
<div id="content" class="h-[calc(100vh-130px)] overflow-y-auto p-4"></div>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full h-[80px] bg-gray-900 flex justify-around items-center border-t border-gray-800">
    <button onclick="loadPage('home')">🏠</button>
    <button onclick="loadPage('profile')">👤</button>
    <button class="bg-blue-600 rounded-full w-14 h-14" onclick="showPostOptions()">+</button>
    <button onclick="loadPage('chat')">💬</button>
    <button onclick="loadPage('market')">📈</button>
</nav>

<script>
function showPostOptions() {
    document.getElementById('content').innerHTML = `
        <div class="bg-gray-800 p-6 rounded-xl">
            <button onclick="alert('Video Upload')" class="w-full bg-blue-600 mb-4 p-2">Video Post</button>
            <div class="flex items-center gap-2">
                <input type="text" id="postText" class="w-full bg-gray-700 p-2" placeholder="Write text...">
                <button onclick="alert('Posting Text...')" class="text-2xl">✉️</button>
            </div>
        </div>`;
}

function loadPage(page) {
    const content = document.getElementById('content');
    if (page === 'home') {
        content.innerHTML = `
            <div class="flex flex-col justify-end h-full">
                <div class="absolute right-4 bottom-24 flex flex-col gap-4 text-right">
                    <button>❤️ Like</button><button>💬 Comment</button><button>➤ Share</button><button>🔔 Sub</button>
                </div>
            </div>`;
    } else if (page === 'profile') {
        content.innerHTML = `
            <div class="flex justify-between"><span onclick="alert('Menu')">...</span><button onclick="alert('Edit Profile')">Edit</button></div>
            <div class="w-24 h-24 rounded-full bg-gray-700 mx-auto mt-4"></div>`;
    } else if (page === 'market') {
        content.innerHTML = `<div id="tv_chart" class="h-full w-full"></div>`;
        new TradingView.widget({ "container_id": "tv_chart", "symbol": "FX:XAUUSD", "theme": "dark", "autosize": true });
    }
}
loadPage('home');
</script>
</body>
</html>
