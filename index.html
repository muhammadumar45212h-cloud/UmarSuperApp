<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umar Super App - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0813;
        }
        .login-card {
            background: rgba(18, 14, 28, 0.8);
            border: 1.5px solid rgba(139, 92, 246, 0.15);
            backdrop-filter: blur(20px);
        }
        .input-field {
            background-color: #161224;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .input-field:focus {
            border-color: #a78bfa;
            outline: none;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-center items-center p-4">

    <!-- LOGIN CONTAINER -->
    <div class="login-card w-full max-w-sm rounded-[32px] p-8 flex flex-col items-center text-center shadow-2xl">
        
        <!-- Crown Logo -->
        <div class="text-5xl mb-4 animate-bounce">👑</div>
        
        <!-- Title -->
        <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-500 to-red-400 uppercase">
            Umar Super App
        </h1>
        <p class="text-gray-400 text-xs mt-1 mb-8">Welcome to the Super App</p>

        <!-- Form Inputs -->
        <form id="loginForm" class="w-full space-y-4">
            <!-- Email / Username Input -->
            <input type="text" id="username" placeholder="Email / Username" required
                class="input-field w-full py-4 px-6 rounded-2xl text-white text-sm placeholder-gray-500 transition-all">

            <!-- Password Input -->
            <input type="password" id="password" placeholder="Password" required
                class="input-field w-full py-4 px-6 rounded-2xl text-white text-sm placeholder-gray-500 transition-all">

            <!-- Phone Number (Optional for local API) -->
            <input type="tel" id="phone" placeholder="Phone Number (Optional)"
                class="input-field w-full py-4 px-6 rounded-2xl text-white text-sm placeholder-gray-500 transition-all">

            <!-- API Status Message -->
            <div id="status-msg" class="text-xs font-semibold hidden"></div>

            <!-- Launch App Button -->
            <button type="submit" class="btn-gradient w-full py-4 rounded-2xl font-bold text-white tracking-wide active:scale-95 transition-all shadow-lg shadow-purple-500/20 flex items-center justify-center gap-2">
                🚀 Launch App
            </button>
        </form>

        <!-- Divider -->
        <div class="my-6 text-gray-600 text-xs tracking-widest uppercase">OR</div>

        <!-- Social Buttons -->
        <div class="w-full space-y-3">
            <!-- Continue with Google -->
            <button class="w-full bg-white text-black font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span>📧</span> Continue with Google
            </button>

            <!-- Login with Phone -->
            <button class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span>📱</span> Login with Phone
            </button>
        </div>

        <!-- Footer -->
        <p class="text-gray-600 text-[10px] mt-8">Made with ❤️ by super app</p>
    </div>

    <!-- CONNECTION TO BACKEND SCRIPT -->
    <script>
        // Apne live Node.js cloud URL se badlein (jaise: https://your-render-app.onrender.com)
        const BACKEND_URL = "http://localhost:3000"; 

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const statusMsg = document.getElementById('status-msg');

            statusMsg.classList.remove('hidden');
            statusMsg.className = "text-xs font-semibold text-amber-400";
            statusMsg.innerText = "Launching App Engine...";

            try {
                // Pehle register karne ki koshish karenge, agar account pehle se hai to direct login karenge
                let response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                let data = await response.json();

                if (!response.ok) {
                    // Agar login fail hua to naya account banane ki try karenge
                    statusMsg.innerText = "Registering new user...";
                    let regResponse = await fetch(`${BACKEND_URL}/api/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    let regData = await regResponse.json();

                    if (regResponse.ok) {
                        statusMsg.className = "text-xs font-semibold text-green-400";
                        statusMsg.innerText = "Account Created! Retrying login...";
                        // Automatic login after register
                        return document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                    } else {
                        statusMsg.className = "text-xs font-semibold text-red-500";
                        statusMsg.innerText = regData.error || "Login & Registration failed.";
                        return;
                    }
                }

                // Agar login success ho gaya:
                statusMsg.className = "text-xs font-semibold text-green-400";
                statusMsg.innerText = "Login Successful! Loading Dashboard...";

                // Save token in LocalStorage
                localStorage.setItem('umar_app_token', data.token);
                localStorage.setItem('umar_app_user', data.username);

                // Redirect user to the main dashboard (index.html)
                setTimeout(() => {
                    window.location.href = "dashboard.html"; // Ya jo bhi aapki main screen file hai
                }, 1500);

            } catch (err) {
                statusMsg.className = "text-xs font-semibold text-red-500";
                statusMsg.innerText = "Server offline. Please start backend first.";
            }
        });
    </script>
</body>
</html>
