<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-white h-screen">

<!-- Login Screen -->
<div id="loginScreen" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-6">
    <input type="number" id="phoneInput" placeholder="Phone Number" class="w-full p-3 mb-3 bg-gray-800 rounded">
    <input type="password" id="passwordInput" placeholder="Password" class="w-full p-3 mb-6 bg-gray-800 rounded">
    <button onclick="handleAuth()" class="w-full bg-blue-600 p-3 rounded font-bold">Login / Sign Up</button>
</div>

<!-- Search Bar (Sticky at Top) -->
<div class="h-14 flex items-center px-4 border-b border-gray-800">
    <input type="text" placeholder="🔍 Search..." class="w-full bg-transparent outline-none">
</div>

<!-- Main Content Area -->
<div id="content" class="h-[calc(100vh-130px)] overflow-y-auto p-4"></div>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full h-16 bg-gray-900 flex justify-around items-center border-t border-gray-800">
    <button onclick="loadPage('home')">🏠</button>
    <button onclick="loadPage('profile')">👤</button>
    <button class="bg-blue-600 rounded-full w-12 h-12 text-2xl" onclick="showPostOptions()">+</button>
    <button onclick="loadPage('chat')">💬</button>
    <button onclick="loadPage('market')">📈</button>
</nav>

<script>
// Authentication Logic
function handleAuth() {
    const phone = document.getElementById('phoneInput').value;
    const password = document.getElementById('passwordInput').value;
    if(phone && password) {
        alert("Login Successful for: " + phone);
        document.getElementById('loginScreen').style.display = 'none';
        loadPage('home');
    }
}

// Post Options (Separate logic)
function showPostOptions() {
    document.getElementById('content').innerHTML = `
        <div class="bg-gray-900 p-4 rounded-xl border border-gray-700">
            <h2 class="mb-4 text-center">Create New Post</h2>
            <button onclick="alert('Select Video/Photo')" class="w-full bg-gray-700 p-3 mb-3 rounded">Upload Photo/Video</button>
            <input type="text" placeholder="Write your text post..." class="w-full p-3 bg-gray-800 rounded mb-3">
            <button class="w-full bg-blue-600 p-3 rounded">Post Now</button>
        </div>`;
}

// Page Loader
function loadPage(page) {
    const content = document.getElementById('content');
    if (page === 'home') {
        content.innerHTML = `
            <div class="h-full flex flex-col justify-end">
                <div class="fixed right-4 bottom-24 flex flex-col gap-4 text-sm">
                    <div class="text-center">❤️<br>Like</div>
                    <div class="text-center">💬<br>Comment</div>
                    <div class="text-center">➤<br>Share</div>
                    <div class="text-center">🔔<br>Sub</div>
                </div>
            </div>`;
    } else if (page === 'chat') {
        content.innerHTML = `<div class="text-center mt-10">Chat System Ready!</div>`;
    } else if (page === 'profile') {
        content.innerHTML = `<div class="text-center mt-10">User Profile (Phone Based)</div>`;
    } else if (page === 'market') {
        content.innerHTML = `<div id="tv_chart" class="h-full w-full"></div>`;
        new TradingView.widget({ "container_id": "tv_chart", "symbol": "FX:XAUUSD", "theme": "dark", "autosize": true });
    }
}
</script>
</body>
</html>
