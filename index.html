<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff;overflow:hidden}
.page{display:none;height:100vh;width:100vw;position:absolute;top:0;left:0}
.page.active{display:block}
.video{width:100%;height:100%;object-fit:cover;background:#111}
.side-bar{position:absolute;right:10px;bottom:100px;display:flex;flex-direction:column;gap:20px;text-align:center}
.side-btn{font-size:28px;cursor:pointer}
.bottom-nav{position:absolute;bottom:0;width:100%;height:60px;background:#000;border-top:1px solid #333;display:flex;justify-content:space-around;align-items:center}
.nav-btn{font-size:26px;cursor:pointer}
.plus-btn{font-size:40px;background:#fff;color:#000;border-radius:10px;padding:0 8px}
.upload-box{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);padding:20px}
.upload-box.active{display:block}
input,textarea,select,button{width:100%;margin:10px 0;padding:12px;border-radius:8px;border:none;font-size:16px}
button{background:#ff0050;color:#fff;font-weight:bold;cursor:pointer}
.chat-box{height:85vh;overflow-y:auto;padding:10px}
.msg{background:#222;padding:8px 12px;border-radius:15px;margin:5px 0;max-width:70%}
.chart{width:100%;height:90vh}
.profile{padding:20px;text-align:center}
</style>
</head>
<body>

<!-- 1. HOME - Fullscreen Video -->
<div class="page active" id="home">
<video class="video" id="mainVideo" src="" autoplay loop muted playsinline></video>
<div class="side-bar">
<div class="side-btn" onclick="alert('Liked ❤️')">❤️<br>14.2K</div>
<div class="side-btn" onclick="alert('Comment box khulega')">💬<br>340</div>
<div class="side-btn" onclick="alert('Share kar diya')">📤<br>Share</div>
<div class="side-btn" onclick="alert('Subscribe kar diya')">➕<br>Join</div>
</div>
</div>

<!-- 2. PROFILE -->
<div class="page" id="profile">
<div class="profile">
<h2>@SuperApp_Creator</h2>
<p>Super App King 👑</p>
<p>Followers: 1.2M | Following: 99</p>
</div>
</div>

<!-- 3. CHAT - WhatsApp jaisa -->
<div class="page" id="chat">
<div class="chat-box" id="chatBox">
<div class="msg">Hello bhai! Kese ho?</div>
<div class="msg" style="margin-left:auto;background:#ff0050">Main badhiya 🔥</div>
</div>
<input id="chatInput" placeholder="Message likho...">
<button onclick="sendMsg()">Send</button>
</div>

<!-- 4. FOREX CHART -->
<div class="page" id="forex">
<iframe class="chart" src="https://s.tradingview.com/widgetembed/?symbol=FX:EURUSD&interval=1" frameborder="0"></iframe>
</div>

<!-- 5. UPLOAD BOX - + button pe khulega -->
<div class="upload-box" id="uploadBox">
<h2>Video Post Karo</h2>
<input type="file" id="videoFile" accept="video/*">
<select id="typeSelect">
<option>Video</option>
<option>Text Post</option>
<option>Song Audio</option>
</select>
<textarea id="desc" placeholder="Description likho... optional"></textarea>
<button onclick="postVideo()">Post</button>
<button onclick="closeUpload()" style="background:#555">Cancel</button>
</div>

<!-- BOTTOM NAV - 5 Button -->
<div class="bottom-nav">
<div class="nav-btn" onclick="showPage('home')">🏠</div>
<div class="nav-btn" onclick="showPage('profile')">👤</div>
<div class="nav-btn plus-btn" onclick="openUpload()">+</div>
<div class="nav-btn" onclick="showPage('chat')">💬</div>
<div class="nav-btn" onclick="showPage('forex')">📈</div>
</div>

<script>
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function openUpload(){document.getElementById('uploadBox').classList.add('active')}
function closeUpload(){document.getElementById('uploadBox').classList.remove('active')}

function postVideo(){
let file=document.getElementById('videoFile').files[0];
let type=document.getElementById('typeSelect').value;
let desc=document.getElementById('desc').value;
if(file && type=='Video'){
let url=URL.createObjectURL(file);
document.getElementById('mainVideo').src=url;
}
alert('Post ho gayi! Home pe dekho 🔥 Desc: '+desc);
closeUpload();
showPage('home');
}

function sendMsg(){
let inp=document.getElementById('chatInput');
if(inp.value.trim()!=''){
let div=document.createElement('div');
div.className='msg';
div.style.marginLeft='auto';
div.style.background='#ff0050';
div.innerText=inp.value;
document.getElementById('chatBox').appendChild(div);
inp.value='';
document.getElementById('chatBox').scrollTop=99999;
}
</script>
</body>
</html>
