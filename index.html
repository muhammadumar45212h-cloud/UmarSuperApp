<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umar Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: black; color: white; margin: 0; padding: 0; }
        .snap-y { scroll-snap-type: y mandatory; }
        .snap-start { scroll-snap-align: start; }
    </style>
</head>
<body class="pb-20">

<div id="content" class="h-screen w-full"></div>

<div class="fixed bottom-0 w-full h-16 bg-gray-900 flex justify-around items-center border-t border-gray-800 z-50">
    <button onclick="renderPage('home')">🏠</button>
    <button onclick="renderPage('profile')">👤</button>
    <button onclick="toggleModal(true)" class="bg-blue-600 w-14 h-14 rounded-full text-2xl -mt-8 font-bold">+</button>
    <button onclick="renderPage('chat')">💬</button>
    <button onclick="renderPage('market')">📈</button>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/90 z-[60] flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-xl w-80">
        <h2 class="text-xl mb-4">Create Post</h2>
        <input type="file" class="mb-4 w-full text-sm">
        <div class="flex gap-2">
            <button onclick="toggleModal(false)" class="bg-gray-600 px-4 py-2 rounded">Cancel</button>
            <button onclick="alert('Post Added!'); toggleModal(false)" class="bg-blue-600 px-4 py-2 rounded flex-1">Post</button>
        </div>
    </div>
</div>

<script>
function renderPage(page) {
    const root = document.getElementById('content');
    if(page === 'home') {
        root.innerHTML = `
            <div class="snap-y snap-mandatory h-screen overflow-y-scroll">
                <div class="snap-start h-screen relative bg-gray-900 flex items-center justify-center">
                    <p>Video Feed (Full Screen)</p>
                    <div class="absolute right-4 bottom-24 flex flex-col items-center gap-6">
                        <button onclick="this.classList.toggle('text-red-500')" class="text-3xl">❤️</button>
                        <button class="text-3xl">💬</button>
                        <button class="text-3xl">↪️</button>
                        <button class="bg-red-600 px-2 py-1 rounded text-xs">SUB</button>
                    </div>
                </div>
            </div>`;
    } else if(page === 'market') {
        root.innerHTML = `<div id="tv_chart" class="h-screen w-full"></div>`;
        loadTV();
    } else if(page === 'profile') {
        root.innerHTML = `
            <div class="p-6 text-center pt-10">
                <img src="https://i.pravatar.cc/150" class="w-24 h-24 rounded-full mx-auto border-2 border-blue-500">
                <h2 class="mt-3 font-bold text-lg">Umar Boss</h2>
                <div class="flex justify-center gap-8 mt-6">
                    <div><p class="font-bold text-xl">10</p><p class="text-[10px] uppercase">Posts</p></div>
                    <div><p class="font-bold text-xl">1.2k</p><p class="text-[10px] uppercase">Subs</p></div>
                    <div><p class="font-bold text-xl">50k</p><p class="text-[10px] uppercase">Likes</p></div>
                </div>
                <div class="grid grid-cols-3 gap-1 mt-6">
                    ${Array(9).fill('<div class="aspect-square bg-gray-800"></div>').join('')}
                </div>
            </div>`;
    } else {
        root.innerHTML = `<div class="p-10 text-center">Chat Room Coming Soon</div>`;
    }
}

function loadTV() {
    const s = document.createElement('script');
    s.src = 'https://s3.tradingview.com/tv.js';
    s.onload = () => new TradingView.widget({container_id: 'tv_chart', symbol: 'FX:XAUUSD', theme: 'dark', autosize: true});
    document.body.appendChild(s);
}

function toggleModal(show) { document.getElementById('modal').className = show ? 'fixed inset-0 bg-black/90 z-[60] flex items-center justify-center' : 'hidden'; }

renderPage('home');
</script>
</body>
</html>
