    <!-- Aapka live chart script yahan rahega -->

<!-- Profile Section -->
<div id="profile-section">
    <img id="user-photo" src="default-avatar.png" alt="Profile" onclick="editProfile()">
    <h2 id="user-name">Umar Boss</h2>
    <button onclick="editProfile()">Edit Profile</button>
</div>

<!-- Video Interaction Logic -->
<script>
    // Like Toggle Logic
    let isLiked = false;
    function toggleLike() {
        const heartBtn = document.getElementById('heart-btn');
        isLiked = !isLiked;
        heartBtn.style.color = isLiked ? 'red' : 'white';
        // Supabase update query yahan add karein
    }

    // Edit Profile Logic
    function editProfile() {
        const newName = prompt("Enter new name:");
        if(newName) document.getElementById('user-name').innerText = newName;
        // Image gallery upload logic yahan aayega
    }
</script>

<style>
    /* UI Adjustments */
    #profile-section { display: flex; flex-direction: column; align-items: center; }
    #user-photo { width: 100px; height: 100px; border-radius: 50%; cursor: pointer; }
</style>
